<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LiftTrack Onyx</title>
    <style>
        :root {
            --bg-dark: #0A0A0A;    
            --bg-matte: #141414;   
            --bg-onyx: #1D1D1D;    
            --accent-blue: #23B4FC; 
            --text-main: #f1f5f9;
            --text-dim: #4A4A4A;   
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); color: var(--text-main); 
            margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--bg-onyx);
            padding-top: calc(var(--safe-top) + 15px);
            padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
        }

        h1 { margin: 0; font-size: 18px; letter-spacing: -1px; font-weight: 800; cursor: pointer; }
        .blue-text { color: var(--accent-blue); }

        .menu-btn { background: none; border: none; cursor: pointer; padding: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 1100; }
        .menu-btn div { width: 22px; height: 2px; background-color: var(--accent-blue); border-radius: 2px; }

        .side-nav {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--bg-matte); z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: calc(var(--safe-top) + 40px) 20px; 
            box-shadow: 10px 0 40px rgba(0,0,0,0.9);
            overflow-y: auto;
        }
        .side-nav.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }

        .nav-section { margin-bottom: 35px; }
        .nav-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; }

        .nav-link {
            display: flex; align-items: center; color: var(--text-main);
            text-decoration: none; padding: 14px 0; font-size: 15px; font-weight: 600;
            border-bottom: 1px solid var(--bg-onyx); cursor: pointer;
        }
        .nav-link svg { margin-right: 12px; color: var(--accent-blue); stroke-width: 2.5; }
        .nav-link.active { color: var(--accent-blue) !important; border-bottom-color: var(--accent-blue); }
        .nav-link-new { color: var(--accent-blue) !important; border-bottom: none; margin-top: 5px; }

        main { max-width: 500px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }

        .add-trigger {
            background-color: var(--accent-blue); height: 70px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-bottom: 25px; border: none; width: 100%;
        }

        .input-card { 
            background-color: var(--bg-matte); padding: 20px; border-radius: 18px; 
            margin-bottom: 30px; border: 1px solid var(--bg-onyx); display: none; 
        }
        .input-card.open { display: block; }

        input {
            width: 100%; background-color: var(--bg-onyx); border: 1px solid #222;
            border-radius: 12px; padding: 14px; color: white; font-size: 16px; margin-bottom: 12px;
        }

        .action-btn { 
            width: 100%; background-color: var(--accent-blue); color: black; border: none; 
            padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer;
        }

        .lift-item {
            background-color: var(--bg-matte); border-radius: 18px;
            padding: 18px; margin-bottom: 12px; border: 1px solid var(--bg-onyx);
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .lift-info { cursor: pointer; flex: 1; padding-right: 10px; }
        .lift-info h3 { margin: 0; font-size: 16px; }
        .lift-info p { margin: 4px 0 0 0; font-size: 10px; color: var(--text-dim); font-weight: 800; }

        .stat-box { text-align: center; background: var(--bg-onyx); padding: 8px; border-radius: 8px; min-width: 48px; }
        .stat-label { font-size: 8px; color: var(--text-dim); font-weight: 800; display: block; }
        .delete-btn { color: #333; padding: 10px; font-size: 18px; cursor: pointer; }

        .pic-card { background-color: var(--bg-matte); border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--bg-onyx); }
        .pic-card img { width: 100%; border-radius: 12px; margin: 12px 0; }
        .remove-small { font-size: 9px; font-weight: 900; color: var(--text-dim); cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <nav class="side-nav" id="sideNav">
        <div class="nav-section">
            <a class="nav-link" id="nav-home" onclick="switchView('lifts', true)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                Home
            </a>
        </div>
        <div class="nav-section">
            <span class="nav-label">Workout Split</span>
            <a class="nav-link nav-link-new" onclick="openDayModal()">
                New Day <span style="margin-left:auto; font-size: 18px;">+</span>
            </a>
            <div id="dynamicDays"></div>
        </div>
        <div class="nav-section">
            <span class="nav-label">Media</span>
            <a class="nav-link" id="nav-pics" onclick="switchView('pics', true)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Progress Pics
            </a>
        </div>
    </nav>

    <header>
        <button class="menu-btn" onclick="toggleMenu()"><div></div><div></div><div></div></button>
        <h1 onclick="location.reload()">LIFT.<span class="blue-text">ONYX</span></h1>
        <div style="width: 42px;"></div>
    </header>

    <main>
        <div id="view-lifts">
            <div style="text-align: center; margin-bottom: 20px;">
                <label id="formLabel" style="color:var(--text-dim); font-size:12px; font-weight: 800; letter-spacing:1px;">SELECT A WORKOUT</label>
            </div>
            <div id="plusTrigger" class="add-trigger hidden" onclick="toggleForm('liftForm')">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            <section id="liftForm" class="input-card">
                <input type="hidden" id="editId">
                <input type="text" id="exerciseInput" placeholder="Exercise Name">
                <div style="display:flex; gap:10px">
                    <input type="number" id="weightInput" placeholder="Lbs">
                    <input type="number" id="repsInput" placeholder="Reps">
                </div>
                <button id="saveBtn" class="action-btn" onclick="saveLift()">Add Entry</button>
            </section>
            <div id="liftContainer"></div>
        </div>

        <div id="view-pics" class="hidden">
            <div style="text-align: center; margin-bottom: 20px;">
                <label style="color:var(--accent-blue); font-size:12px; font-weight: 800;">PROGRESS GALLERY</label>
            </div>
            <div class="add-trigger" onclick="toggleForm('picForm')">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            <section id="picForm" class="input-card">
                <input type="text" id="picTitle" placeholder="Title">
                <input type="file" id="picUpload" accept="image/*">
                <button class="action-btn" onclick="savePic()">Upload Photo</button>
            </section>
            <div id="picContainer"></div>
        </div>
    </main>

    <script>
        let currentDayId = null;
        const keys = { days: 'onyx_days_v7', lifts: 'onyx_lifts_v7', pics: 'onyx_pics_v7' };

        window.onload = () => { renderDays(); displayLifts(); displayPics(); updateNavHighlights(); };

        function toggleMenu() {
            document.getElementById('sideNav').classList.toggle('open');
            document.getElementById('overlay').style.display = document.getElementById('sideNav').classList.contains('open') ? 'block' : 'none';
        }

        function closeAll() {
            document.getElementById('sideNav').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        function switchView(view, isNavClick) {
            document.getElementById('view-lifts').classList.toggle('hidden', view !== 'lifts');
            document.getElementById('view-pics').classList.toggle('hidden', view !== 'pics');
            if(view === 'pics') currentDayId = null;
            if(isNavClick) { updateNavHighlights(); closeAll(); }
        }

        function updateNavHighlights() {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            const isPics = !document.getElementById('view-pics').classList.contains('hidden');
            if (isPics) {
                document.getElementById('nav-pics').classList.add('active');
            } else if (currentDayId) {
                const dayLink = document.querySelector(`[data-day-id="${currentDayId}"]`);
                if(dayLink) dayLink.classList.add('active');
            } else {
                document.getElementById('nav-home').classList.add('active');
            }
        }

        function openDayModal() {
            const name = prompt("Workout Name:");
            if (!name) return;
            let days = JSON.parse(localStorage.getItem(keys.days)) || [];
            const newDay = { id: Date.now(), name };
            days.push(newDay);
            localStorage.setItem(keys.days, JSON.stringify(days));
            renderDays(); selectDay(newDay.id, newDay.name);
            closeAll();
        }

        function renderDays() {
            const container = document.getElementById('dynamicDays');
            const days = JSON.parse(localStorage.getItem(keys.days)) || [];
            container.innerHTML = days.map(day => `
                <div class="nav-link" data-day-id="${day.id}" onclick="selectDay(${day.id}, '${day.name}')">
                    ${day.name}
                    <span style="margin-left:auto; padding:5px; color:#444;" onclick="deleteDay(event, ${day.id})">✕</span>
                </div>
            `).join('');
            updateNavHighlights();
        }

        function selectDay(id, name) {
            currentDayId = id;
            switchView('lifts', false);
            document.getElementById('formLabel').innerText = name.toUpperCase();
            document.getElementById('formLabel').style.color = "var(--accent-blue)";
            document.getElementById('plusTrigger').classList.remove('hidden');
            updateNavHighlights();
            displayLifts();
        }

        function deleteDay(e, id) {
            e.stopPropagation();
            if(!confirm("Delete workout?")) return;
            let days = JSON.parse(localStorage.getItem(keys.days)) || [];
            localStorage.setItem(keys.days, JSON.stringify(days.filter(d => d.id !== id)));
            if(currentDayId === id) currentDayId = null;
            renderDays(); displayLifts();
        }

        function toggleForm(id) { document.getElementById(id).classList.toggle('open'); }

        function getFullDate() {
            const d = new Date();
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function saveLift() {
            const ex = document.getElementById('exerciseInput').value;
            const w = document.getElementById('weightInput').value;
            const r = document.getElementById('repsInput').value;
            const editId = document.getElementById('editId').value;
            if (!ex || !w || !r || !currentDayId) return;

            let lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            if (editId) {
                const idx = lifts.findIndex(l => l.id == editId);
                if(idx > -1) lifts[idx] = { ...lifts[idx], exercise: ex, weight: w, reps: r };
            } else {
                lifts.unshift({ id: Date.now(), dayId: currentDayId, exercise: ex, weight: w, reps: r, date: getFullDate() });
            }
            localStorage.setItem(keys.lifts, JSON.stringify(lifts));
            resetLiftForm(); displayLifts();
        }

        function resetLiftForm() {
            document.getElementById('exerciseInput').value = '';
            document.getElementById('weightInput').value = '';
            document.getElementById('repsInput').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').innerText = 'Add Entry';
            document.getElementById('liftForm').classList.remove('open');
        }

        function editLift(id) {
            const lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            const lift = lifts.find(l => l.id == id);
            if(!lift) return;
            document.getElementById('exerciseInput').value = lift.exercise;
            document.getElementById('weightInput').value = lift.weight;
            document.getElementById('repsInput').value = lift.reps;
            document.getElementById('editId').value = lift.id;
            document.getElementById('saveBtn').innerText = 'Update Entry';
            document.getElementById('liftForm').classList.add('open');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteLift(id) {
            if(!confirm("Delete log?")) return;
            let lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            localStorage.setItem(keys.lifts, JSON.stringify(lifts.filter(l => l.id !== id)));
            displayLifts();
        }

        function displayLifts() {
            const container = document.getElementById('liftContainer');
            if (!currentDayId) { container.innerHTML = ''; return; }
            const lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            const filtered = lifts.filter(l => l.dayId === currentDayId);
            container.innerHTML = filtered.map(l => `
                <div class="lift-item">
                    <div class="lift-info" onclick="editLift(${l.id})">
                        <h3>${l.exercise}</h3>
                        <p>${l.date} • <span style="color:var(--accent-blue)">EDIT</span></p>
                    </div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <div class="stat-box"><span class="stat-label">LBS</span><span style="color:var(--accent-blue); font-weight:900">${l.weight}</span></div>
                        <div class="stat-box"><span class="stat-label">REPS</span><span style="font-weight:900">${l.reps}</span></div>
                        <div class="delete-btn" onclick="deleteLift(${l.id})">✕</div>
                    </div>
                </div>
            `).join('');
        }

        function savePic() {
            const title = document.getElementById('picTitle').value;
            const fileInput = document.getElementById('picUpload');
            if (!title || !fileInput.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                let pics = JSON.parse(localStorage.getItem(keys.pics)) || [];
                pics.unshift({ id: Date.now(), title, image: e.target.result, date: getFullDate() });
                localStorage.setItem(keys.pics, JSON.stringify(pics));
                displayPics(); toggleForm('picForm');
                document.getElementById('picTitle').value = '';
                document.getElementById('picUpload').value = '';
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function displayPics() {
            const container = document.getElementById('picContainer');
            const pics = JSON.parse(localStorage.getItem(keys.pics)) || [];
            container.innerHTML = pics.map(p => `
                <div class="pic-card">
                    <h3 style="margin:0">${p.title}</h3>
                    <img src="${p.image}">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-size:10px; color:var(--text-dim); font-weight:800">${p.date}</span>
                        <div class="remove-small" onclick="deletePic(${p.id})">REMOVE</div>
                    </div>
                </div>
            `).join('');
        }

        function deletePic(id) {
            if(confirm("Delete photo?")) {
                let pics = JSON.parse(localStorage.getItem(keys.pics)) || [];
                localStorage.setItem(keys.pics, JSON.stringify(pics.filter(p => p.id !== id)));
                displayPics();
            }
        }
    </script>
</body>
</html>
