<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiftTrack Onyx</title>
    <style>
        /* BASE STYLES */
        :root {
            --bg-dark: #121212;
            --bg-matte: #1E1E1E;
            --bg-onyx: #282828;
            --neon: #00FFFF;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 50px; 
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER & NAVIGATION */
        header {
            background-color: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--bg-onyx);
        }

        .header-top {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 20px; letter-spacing: -1px; font-weight: 800; }
        .neon-text { color: var(--neon); }

        nav { display: flex; overflow-x: auto; }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-dim);
            padding: 15px 0;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .tab-btn.active { color: var(--neon); border-bottom-color: var(--neon); }

        /* FORM */
        main { max-width: 500px; margin: 0 auto; padding: 20px; }

        .input-card {
            background-color: var(--bg-matte);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .input-card.editing { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }

        input {
            width: 100%;
            background-color: var(--bg-onyx);
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 16px; /* Prevents iPhone zoom on focus */
            margin-bottom: 12px;
        }

        .flex-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .field-group { flex: 1; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; }

        button#submitBtn {
            width: 100%;
            background-color: var(--neon);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
        }
        
        button#cancelBtn {
            background-color: var(--bg-onyx);
            color: var(--text-dim);
            border: none;
            padding: 15px;
            border-radius: 12px;
            margin-top: 8px;
            width: 100%;
            font-weight: 700;
        }

        /* LIST ITEMS */
        .lift-item {
            background-color: var(--bg-matte);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .lift-info h3 { margin: 0; font-size: 17px; }
        .lift-info p { margin: 4px 0 0 0; font-size: 10px; color: var(--text-dim); font-weight: 700; }

        .lift-stats { display: flex; gap: 8px; align-items: center; }
        .stat-box {
            background-color: var(--bg-onyx);
            padding: 8px 12px;
            border-radius: 10px;
            text-align: center;
            min-width: 55px;
        }
        .stat-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; display: block; }
        .stat-val { font-weight: 900; font-size: 16px; }
        .neon-val { color: var(--neon); }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .action-btn { background: none; border: none; font-size: 10px; font-weight: 800; cursor: pointer; }
        .edit-btn { color: var(--neon); opacity: 0.7; }
        .del-btn { color: #444; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>LIFT.<span class="neon-text">ONYX</span></h1>
        </div>
        <nav id="tabBar">
            <button onclick="switchTab('Push')" class="tab-btn active">PUSH</button>
            <button onclick="switchTab('Pull')" class="tab-btn">PULL</button>
            <button onclick="switchTab('Legs')" class="tab-btn">LEGS</button>
            <button onclick="switchTab('Other')" class="tab-btn">OTHER</button>
        </nav>
    </header>

    <main>
        <section id="inputForm" class="input-card">
            <input type="hidden" id="editId">
            
            <label>Exercise</label>
            <input type="text" id="exerciseInput" placeholder="e.g. Bench Press">
            
            <div class="flex-row">
                <div class="field-group">
                    <label>Weight</label>
                    <input type="number" id="weightInput" placeholder="lbs">
                </div>
                <div class="field-group">
                    <label>Reps</label>
                    <input type="number" id="repsInput" placeholder="0">
                </div>
            </div>
            
            <button id="submitBtn" onclick="saveLift()">Add to Push</button>
            <button id="cancelBtn" class="hidden" onclick="resetForm()">Cancel Edit</button>
        </section>

        <div id="liftContainer"></div>
    </main>

    <script>
        let currentTab = 'Push';
        const storageKey = 'onyx_v4_data';

        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === tabName.toUpperCase());
            });
            document.getElementById('submitBtn').innerText = `Add to ${tabName}`;
            resetForm();
            displayLifts();
        }

        function saveLift() {
            const exercise = document.getElementById('exerciseInput').value;
            const weight = document.getElementById('weightInput').value;
            const reps = document.getElementById('repsInput').value;
            const editId = document.getElementById('editId').value;

            if (!exercise || !weight || !reps) return;

            let lifts = JSON.parse(localStorage.getItem(storageKey)) || [];

            if (editId) {
                lifts = lifts.map(l => l.id == editId ? {...l, exercise, weight, reps} : l);
            } else {
                lifts.unshift({
                    id: Date.now(),
                    category: currentTab,
                    exercise,
                    weight,
                    reps,
                    date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'})
                });
            }

            localStorage.setItem(storageKey, JSON.stringify(lifts));
            resetForm();
            displayLifts();
        }

        function editLift(id) {
            const lifts = JSON.parse(localStorage.getItem(storageKey)) || [];
            const lift = lifts.find(l => l.id === id);
            if (lift) {
                document.getElementById('exerciseInput').value = lift.exercise;
                document.getElementById('weightInput').value = lift.weight;
                document.getElementById('repsInput').value = lift.reps;
                document.getElementById('editId').value = lift.id;
                document.getElementById('submitBtn').innerText = "Update Entry";
                document.getElementById('cancelBtn').classList.remove('hidden');
                document.getElementById('inputForm').classList.add('editing');
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }

        function resetForm() {
            document.getElementById('exerciseInput').value = '';
            document.getElementById('weightInput').value = '';
            document.getElementById('repsInput').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('submitBtn').innerText = `Add to ${currentTab}`;
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('inputForm').classList.remove('editing');
        }

        function deleteLift(id) {
            if(confirm("Delete this lift?")) {
                let lifts = JSON.parse(localStorage.getItem(storageKey)) || [];
                lifts = lifts.filter(l => l.id !== id);
                localStorage.setItem(storageKey, JSON.stringify(lifts));
                displayLifts();
            }
        }

        function displayLifts() {
            const container = document.getElementById('liftContainer');
            const lifts = JSON.parse(localStorage.getItem(storageKey)) || [];
            const filtered = lifts.filter(l => l.category === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#444; margin-top:40px; font-size:13px italic">No ${currentTab} data.</p>`;
                return;
            }

            container.innerHTML = filtered.map(l => `
                <div class="lift-item">
                    <div class="lift-info">
                        <h3>${l.exercise}</h3>
                        <p>${l.date}</p>
                    </div>
                    <div class="lift-stats">
                        <div class="stat-box">
                            <span class="stat-label">Lbs</span>
                            <span class="stat-val neon-val">${l.weight}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Reps</span>
                            <span class="stat-val">${l.reps}</span>
                        </div>
                        <div class="actions">
                            <button class="action-btn edit-btn" onclick="editLift(${l.id})">EDIT</button>
                            <button class="action-btn del-btn" onclick="deleteLift(${l.id})">✕</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = displayLifts;
    </script>
</body>
</html>
