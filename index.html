<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LiftTrack Onyx</title>
    <style>
        :root {
            --bg-dark: #0A0A0A;    
            --bg-matte: #141414;   
            --bg-onyx: #1D1D1D;    
            --accent-blue: #23B4FC; 
            --text-main: #f1f5f9;
            --text-dim: #4A4A4A;   
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); color: var(--text-main); 
            margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--bg-onyx);
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
        }

        h1 { margin: 0; font-size: 18px; letter-spacing: -1px; font-weight: 800; cursor: pointer; }
        .blue-text { color: var(--accent-blue); }

        .menu-btn { background: none; border: none; cursor: pointer; padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn div { width: 22px; height: 2px; background-color: var(--accent-blue); border-radius: 2px; }

        /* SIDE NAV */
        .side-nav {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--bg-matte); z-index: 200;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            overflow-y: auto;
        }
        .side-nav.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; display: none; }

        .nav-section { margin-bottom: 35px; }
        .nav-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; }

        .nav-link {
            display: flex; align-items: center; color: var(--text-main);
            text-decoration: none; padding: 14px 0; font-size: 15px; font-weight: 600;
            border-bottom: 1px solid var(--bg-onyx); cursor: pointer; transition: color 0.2s;
        }
        .nav-link svg { margin-right: 12px; color: var(--accent-blue); }
        .nav-link.active { color: var(--accent-blue) !important; border-bottom-color: var(--accent-blue); }
        .nav-link-new { color: var(--accent-blue) !important; }

        /* MAIN UI */
        main { max-width: 500px; margin: 0 auto; padding: 20px; }

        .add-trigger {
            background-color: var(--accent-blue);
            height: 80px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-bottom: 25px; transition: transform 0.1s;
            border: none; width: 100%;
        }
        .add-trigger:active { transform: scale(0.97); }
        .add-trigger svg { color: #000; width: 32px; height: 32px; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }

        .input-card { 
            background-color: var(--bg-matte); padding: 24px; border-radius: 18px; 
            margin-bottom: 30px; border: 1px solid var(--bg-onyx); display: none; 
        }
        .input-card.open { display: block; animation: slideDown 0.3s ease-out; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        input {
            width: 100%; background-color: var(--bg-onyx); border: 1px solid #222;
            border-radius: 12px; padding: 14px; color: white; font-size: 16px; margin-bottom: 14px; display: block;
        }

        button.action-btn {
            width: 100%; background-color: var(--accent-blue); color: black; border: none;
            padding: 16px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer;
        }

        /* CARDS */
        .pic-card, .lift-item {
            background-color: var(--bg-matte); border-radius: 18px;
            padding: 18px; margin-bottom: 14px; border: 1px solid var(--bg-onyx);
        }
        .pic-card h3, .lift-info h3 { margin: 0; font-size: 16px; }
        .pic-card img { width: 100%; border-radius: 12px; margin: 12px 0; display: block; }
        .date-label { font-size: 10px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }

        .lift-item { display: flex; align-items: center; justify-content: space-between; }
        .lift-info { cursor: pointer; flex-grow: 1; }
        .lift-info p { margin: 5px 0 0 0; font-size: 10px; color: var(--text-dim); font-weight: 700; }

        /* SMALLER REMOVE BTN */
        .remove-small {
            font-size: 9px; font-weight: 900; color: #444; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .remove-small:hover { color: #ff4444; }

        .hidden { display: none !important; }
        .delete-icon { color: #333; cursor: pointer; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <nav class="side-nav" id="sideNav">
        <div class="nav-section">
            <a class="nav-link" id="nav-home" onclick="switchView('lifts', true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                Home
            </a>
        </div>
        <div class="nav-section">
            <span class="nav-label">Workout Split</span>
            <a class="nav-link nav-link-new" onclick="openDayModal()">
                New Day <span style="margin-left:auto; font-size: 18px;">+</span>
            </a>
            <div id="dynamicDays"></div>
        </div>
        <div class="nav-section">
            <span class="nav-label">Media</span>
            <a class="nav-link" id="nav-pics" onclick="switchView('pics', true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Progress Pics
            </a>
        </div>
    </nav>

    <header>
        <button class="menu-btn" onclick="toggleMenu()"><div></div><div></div><div></div></button>
        <h1 onclick="switchView('lifts', true)">LIFT.<span class="blue-text">ONYX</span></h1>
        <div style="width: 32px;"></div>
    </header>

    <main>
        <div id="view-lifts">
            <div style="text-align: center; margin-bottom: 25px;">
                <label id="formLabel" style="color:var(--text-dim); font-size:14px; letter-spacing: 1.5px; font-weight: 800;">SELECT A DAY TO START</label>
            </div>
            <div id="plusTrigger" class="add-trigger hidden" onclick="toggleForm('liftForm')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            
            <section id="liftForm" class="input-card">
                <input type="hidden" id="editId">
                <label style="font-size:10px; color:var(--text-dim); font-weight:800; margin-bottom:5px; display:block;">EXERCISE</label>
                <input type="text" id="exerciseInput" placeholder="Bench Press">
                <div style="display:flex; gap:12px">
                    <div style="flex:1"><label style="font-size:10px; color:var(--text-dim); font-weight:800;">WEIGHT</label><input type="number" id="weightInput" placeholder="lbs"></div>
                    <div style="flex:1"><label style="font-size:10px; color:var(--text-dim); font-weight:800;">REPS</label><input type="number" id="repsInput" placeholder="0"></div>
                </div>
                <button id="saveBtn" class="action-btn" onclick="saveLift()">Add Entry</button>
            </section>
            <div id="liftContainer"></div>
        </div>

        <div id="view-pics" class="hidden">
            <div style="text-align: center; margin-bottom: 25px;">
                <label style="color:var(--accent-blue); font-size:14px; letter-spacing: 1.5px; font-weight: 800;">PROGRESS PICS</label>
            </div>
            <div class="add-trigger" onclick="toggleForm('picForm')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>

            <section id="picForm" class="input-card">
                <label style="font-size:10px; color:var(--text-dim); font-weight:800;">PHOTO TITLE</label>
                <input type="text" id="picTitle" placeholder="Post-Chest Day Pump">
                <label style="font-size:10px; color:var(--text-dim); font-weight:800;">UPLOAD IMAGE</label>
                <input type="file" id="picUpload" accept="image/*" style="font-size: 12px; background:transparent; border:none; padding:10px 0;">
                <button class="action-btn" onclick="savePic()">Save to Gallery</button>
            </section>
            <div id="picContainer"></div>
        </div>
    </main>

    <script>
        let currentDayId = null;
        let activeView = 'lifts';
        const keys = { days: 'onyx_days_v3', lifts: 'onyx_lifts_v3', pics: 'onyx_pics_v3' };

        window.onload = () => { renderDays(); displayLifts(); displayPics(); updateNavHighlights(); };

        function toggleMenu() {
            document.getElementById('sideNav').classList.toggle('open');
            document.getElementById('overlay').style.display = document.getElementById('sideNav').classList.contains('open') ? 'block' : 'none';
        }

        function closeAll() {
            document.getElementById('sideNav').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        function switchView(view, isNavClick) {
            activeView = view;
            if(view === 'pics') currentDayId = null; 
            document.getElementById('view-lifts').classList.toggle('hidden', view !== 'lifts');
            document.getElementById('view-pics').classList.toggle('hidden', view !== 'pics');
            if(isNavClick) { updateNavHighlights(); closeAll(); }
        }

        function updateNavHighlights() {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            if (activeView === 'pics') {
                document.getElementById('nav-pics').classList.add('active');
            } else if (currentDayId) {
                const dayLink = document.querySelector(`[data-day-id="${currentDayId}"]`);
                if(dayLink) dayLink.classList.add('active');
            } else {
                document.getElementById('nav-home').classList.add('active');
            }
        }

        function openDayModal() {
            const name = prompt("Enter Day Name");
            if (!name) return;
            let days = JSON.parse(localStorage.getItem(keys.days)) || [];
            const newDay = { id: Date.now(), name };
            days.push(newDay);
            localStorage.setItem(keys.days, JSON.stringify(days));
            renderDays(); selectDay(newDay.id, newDay.name);
            closeAll();
        }

        function renderDays() {
            const container = document.getElementById('dynamicDays');
            const days = JSON.parse(localStorage.getItem(keys.days)) || [];
            container.innerHTML = days.map(day => `
                <a class="nav-link" data-day-id="${day.id}" onclick="selectDay(${day.id}, '${day.name}')">
                    ${day.name}
                    <span style="margin-left:auto; font-size:14px; color:#333;" onclick="deleteDay(event, ${day.id})">✕</span>
                </a>
            `).join('');
            updateNavHighlights();
        }

        function selectDay(id, name) {
            currentDayId = id;
            switchView('lifts', false);
            document.getElementById('formLabel').innerText = name.toUpperCase();
            document.getElementById('formLabel').style.color = "var(--accent-blue)";
            document.getElementById('plusTrigger').classList.remove('hidden');
            updateNavHighlights();
            displayLifts();
        }

        function deleteDay(e, id) {
            e.stopPropagation();
            if(!confirm("Delete day and all its lifts?")) return;
            let days = JSON.parse(localStorage.getItem(keys.days)) || [];
            days = days.filter(d => d.id !== id);
            localStorage.setItem(keys.days, JSON.stringify(days));
            if(currentDayId === id) currentDayId = null;
            renderDays(); displayLifts();
        }

        function toggleForm(id) { document.getElementById(id).classList.toggle('open'); }

        function saveLift() {
            const ex = document.getElementById('exerciseInput').value;
            const w = document.getElementById('weightInput').value;
            const r = document.getElementById('repsInput').value;
            const editId = document.getElementById('editId').value;
            if (!ex || !w || !r || !currentDayId) return;

            let lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            if (editId) {
                const idx = lifts.findIndex(l => l.id == editId);
                if(idx > -1) lifts[idx] = { ...lifts[idx], exercise: ex, weight: w, reps: r };
            } else {
                lifts.unshift({ id: Date.now(), dayId: currentDayId, exercise: ex, weight: w, reps: r, date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}) });
            }
            localStorage.setItem(keys.lifts, JSON.stringify(lifts));
            resetLiftForm(); displayLifts();
        }

        function resetLiftForm() {
            document.getElementById('exerciseInput').value = '';
            document.getElementById('weightInput').value = '';
            document.getElementById('repsInput').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').innerText = 'Add Entry';
            document.getElementById('liftForm').classList.remove('open');
        }

        function editLift(id) {
            const lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            const lift = lifts.find(l => l.id == id);
            if(!lift) return;
            document.getElementById('exerciseInput').value = lift.exercise;
            document.getElementById('weightInput').value = lift.weight;
            document.getElementById('repsInput').value = lift.reps;
            document.getElementById('editId').value = lift.id;
            document.getElementById('saveBtn').innerText = 'Update Entry';
            document.getElementById('liftForm').classList.add('open');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteLift(id) {
            if(!confirm("Delete log?")) return;
            let lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            lifts = lifts.filter(l => l.id !== id);
            localStorage.setItem(keys.lifts, JSON.stringify(lifts));
            displayLifts();
        }

        function displayLifts() {
            const container = document.getElementById('liftContainer');
            if (!currentDayId) { container.innerHTML = ''; return; }
            const lifts = JSON.parse(localStorage.getItem(keys.lifts)) || [];
            const filtered = lifts.filter(l => l.dayId === currentDayId);
            container.innerHTML = filtered.map(l => `
                <div class="lift-item">
                    <div class="lift-info" onclick="editLift(${l.id})">
                        <h3>${l.exercise}</h3><p>${l.date} (Tap to edit)</p>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="text-align:center"><span style="font-size:8px; color:var(--text-dim); font-weight:800">LBS</span><div style="background:var(--bg-onyx); padding:8px; border-radius:8px; min-width:45px"><span style="color:var(--accent-blue); font-weight:900">${l.weight}</span></div></div>
                        <div style="text-align:center"><span style="font-size:8px; color:var(--text-dim); font-weight:800">REPS</span><div style="background:var(--bg-onyx); padding:8px; border-radius:8px; min-width:45px"><span style="font-weight:900">${l.reps}</span></div></div>
                        <div class="delete-icon" onclick="deleteLift(${l.id})">✕</div>
                    </div>
                </div>
            `).join('');
        }

        function savePic() {
            const title = document.getElementById('picTitle').value;
            const fileInput = document.getElementById('picUpload');
            if (!title || !fileInput.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                let pics = JSON.parse(localStorage.getItem(keys.pics)) || [];
                pics.unshift({ id: Date.now(), title, image: e.target.result, date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) });
                localStorage.setItem(keys.pics, JSON.stringify(pics));
                document.getElementById('picTitle').value = '';
                document.getElementById('picUpload').value = '';
                toggleForm('picForm'); displayPics();
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function displayPics() {
            const container = document.getElementById('picContainer');
            const pics = JSON.parse(localStorage.getItem(keys.pics)) || [];
            container.innerHTML = pics.map(p => `
                <div class="pic-card">
                    <h3>${p.title}</h3>
                    <img src="${p.image}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="date-label">${p.date}</span>
                        <div class="remove-small" onclick="deletePic(${p.id})">Remove</div>
                    </div>
                </div>
            `).join('');
        }

        function deletePic(id) {
            if(!confirm("Delete photo?")) return;
            let pics = JSON.parse(localStorage.getItem(keys.pics)) || [];
            pics = pics.filter(p => p.id !== id);
            localStorage.setItem(keys.pics, JSON.stringify(pics));
            displayPics();
        }
    </script>
</body>
</html>
